    let openedCount = 0;

    function openDialog(id) {
        openedCount++;

     }

    if (openedCount > 20) {
        message = "It's too late.";
    }

    text.innerHTML = message;
    dialog.showModal();
}

    dialog.close();
}

function viewPhoto(src) {
    text.innerHTML = `
        <div class="photo-view">
            <button class="back-btn" onclick="openDialog(3)">← Back</button>
            <img src="${src}" class="full-photo"/>

            <div class="photo-info">
                <p>Taken at 03:17 AM</p>
                <p>Location: Unknown</p>
            </div>
        </div>
    `;
}
let currentApp = null;

function openDialog(id) {
    currentApp = id;

    let message = contentMap[id];

    text.innerHTML = message;
    dialog.showModal();
}
/*Pop1*/
function triggerPulse() {
    for (let i = 0; i < 15; i++) {
        setTimeout(() => {
            spawnCircleRandom();
        }, i * 100);
    }
}
function spawnCircleRandom() {
    const circle = document.createElement("div");
    circle.className = "circle";

    circle.style.left = Math.random() * window.innerWidth + "px";
    circle.style.top = Math.random() * window.innerHeight + "px";

    document.body.appendChild(circle);

    setTimeout(() => circle.remove(), 1000);
}
/*pop2*/
const messages = [
    "Hello?",
    "Who are you.",
    "Open it again",
    "Don't leave",
    "I saw that"
];

function triggerMessages() {
    for (let i = 0; i < 10; i++) {
        setTimeout(() => spawnMessage(), i * 200);
    }
}

function spawnMessage() {
    const msg = document.createElement("div");
    msg.className = "popup-msg";
    msg.innerText = messages[Math.floor(Math.random() * messages.length)];

    msg.style.left = Math.random() * window.innerWidth + "px";
    msg.style.top = Math.random() * window.innerHeight + "px";

    document.body.appendChild(msg);

    setTimeout(() => msg.remove(), 2000);
}
/*pop3*/
function triggerFlash() {
    const flash = document.createElement("div");
    flash.className = "flash";

    document.body.appendChild(flash);

    setTimeout(() => flash.remove(), 300);
}
/*pop4*/
function triggerWave() {
    document.body.classList.add("wave-effect");

    setTimeout(() => {
        document.body.classList.remove("wave-effect");
    }, 2000);
}
/*pop5*/
function triggerCreepy() {
    const overlay = document.createElement("div");
    overlay.className = "creepy";

    overlay.innerText = "Don't turn around.";

    document.body.appendChild(overlay);

    setTimeout(() => {
        overlay.innerText = "Too late.";
    }, 1500);

    setTimeout(() => overlay.remove(), 3000);
}
/*Lock*/
function triggerAlert() {
    for (let i = 0; i < 25; i++) {
        setTimeout(() => spawnAlert(), i * 100);
    }
}

function spawnAlert() {
    const alertBox = document.createElement("div");
    alertBox.className = "alert-box";

    const warnings = [
        "Unauthorized access detected",
        "THIS IS NOT YOUR DEVICE",
        "Private data EXPOSED",
        "Stop.",
        "You were not invited",
        "EXPOSED EXPOSED EXPOSED"
    ];

    alertBox.innerHTML = `
        <p>${warnings[Math.floor(Math.random() * warnings.length)]}</p>
        <button>OK</button>
    `;

    alertBox.style.left = Math.random() * (window.innerWidth - 200) + "px";
    alertBox.style.top = Math.random() * (window.innerHeight - 100) + "px";

    document.body.appendChild(alertBox);
}
/*row 5 button*/
let runawayMoves = 0;

document.addEventListener("mouseover", (e) => {
    if (e.target.classList.contains("runaway") && runawayMoves < 2) {
        runawayMoves++;

        e.target.style.position = "absolute";
        e.target.style.left = Math.random() * 200 + "px";
        e.target.style.top = Math.random() * 200 + "px";
    }
});
/*row 2 button*/
function fakeClose() {
    dialog.close();

    setTimeout(() => {
        openDialog(currentApp); // reopen the SAME icon content
    }, 400);
}
